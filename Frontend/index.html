<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RBAC - Basic Frontend</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h1>Role-Based Reimbursements (Basic UI)</h1>

        <div id="auth-area">
            <div id="register-form" class="card">
                <h2>Register</h2>
                <input id="reg-name" placeholder="Name" />
                <input id="reg-email" placeholder="Email" />
                <input id="reg-password" placeholder="Password" type="password" />
                <button id="btn-register">Register</button>
                <div id="reg-msg" class="msg"></div>
            </div>

            <div id="login-form" class="card">
                <h2>Login</h2>
                <input id="login-email" placeholder="Email" />
                <input id="login-password" placeholder="Password" type="password" />
                <button id="btn-login">Login</button>
                <div id="login-msg" class="msg"></div>
            </div>
        </div>

        <div id="app-area" class="hidden">
            <div class="card">
                <div class="row">
                    <div>
                        <strong id="user-info"></strong>
                    </div>
                    <div>
                        <button id="btn-logout">Logout</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Create Reimbursement (EMP)</h2>
                <input id="rb-title" placeholder="Title" />
                <input id="rb-amount" placeholder="Amount" type="number" />
                <textarea id="rb-desc" placeholder="Description"></textarea>
                <button id="btn-create-rb">Create</button>
                <div id="rb-msg" class="msg"></div>
            </div>

            <div class="card">
                <h2>Reimbursements</h2>
                <div id="rb-list">Loading...</div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>

</html>
